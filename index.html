<!DOCTYPE html>
<html>
<head>
<title>For My Munchkin 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins&family=Pacifico&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #ffd6e0, #ffe6f0);
  overflow: hidden;
}

.page {
  display: flex;
  height: 100vh;
  justify-content: center;
  align-items: center;
}

.card {
  background: white;
  padding: 30px;
  border-radius: 25px;
  text-align: center;
  box-shadow: 0 15px 40px rgba(0,0,0,0.1);
}

button {
  padding: 12px 25px;
  border: none;
  background: linear-gradient(45deg,#ff4d88,#ff99cc);
  color: white;
  border-radius: 25px;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.1);
  box-shadow: 0 0 15px pink;
}

#letterBox {
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(255,192,203,0.95);
  justify-content:center;
  align-items:center;
}

.slider img {
  width: 200px;
  border-radius: 15px;
  animation: zoom 2s infinite;
  box-shadow: 0 0 20px pink;
}

@keyframes zoom {
  0% {transform: scale(1);}
  50% {transform: scale(1.1);}
  100% {transform: scale(1);}
}

.heart {
  position: absolute;
  font-size: 20px;
  animation: floatUp 6s linear infinite;
}

@keyframes floatUp {
  0% {transform: translateY(100vh);}
  100% {transform: translateY(-10vh);}
}

@keyframes pop {
  0% {transform: scale(0);}
  100% {transform: scale(1.5); opacity:0;}
}
</style>
</head>

<body onclick="createHeart(event)">

<audio id="music" loop>
  <source src="song.mp3">
</audio>

<script>
for (let i = 0; i < 15; i++) {
  let h = document.createElement("div");
  h.innerHTML = "💖";
  h.className = "heart";
  h.style.left = Math.random()*100+"vw";
  h.style.animationDuration = (3+Math.random()*3)+"s";
  document.body.appendChild(h);
}
</script>

<div class="page">
  <div class="card">
    <h2 style="font-family:Pacifico;">a love letter to you 💌</h2>
    <button onclick="openLetter()">Open My Heart 💖</button>
  </div>
</div>

<div id="letterBox">
  <div class="card">
    <h2 style="font-family:Pacifico;">My Munchkin 💖</h2>
    <p id="loveText"></p>
  </div>
</div>

<script>
function openLetter(){
  document.getElementById("letterBox").style.display="flex";
  startTyping();
  document.getElementById("music").play().catch(()=>{});
}

/* LETTER */
let letter = "Happy Birthday my munchkin 💖\n\nI’m writing this with my whole heart, because that’s where you live now.\n\nIt’s been 5 beautiful years of us… and every moment still feels magical.\n\nFrom movie dates to gamezone fun, every memory with you is my favorite.\n\nYou understand me, take care of me, travel for me, and love me in ways I never imagined.\n\nYou are my safe place, my peace, my happiness.\n\nI will always choose you, again and again.\n\nI love you endlessly 💞";

let i = 0;

function startTyping(){
  document.getElementById("loveText").innerHTML="";
  i = 0;
  type();
}

function type(){
  if(i < letter.length){
    document.getElementById("loveText").innerHTML += letter.charAt(i);
    i++;
    setTimeout(type,30);
  } else {
    showFinal();
  }
}

/* PHOTO SLIDER */
let images = ["photo1.jpg","photo2.jpg","photo3.jpg"];
let index = 0;

function showFinal(){
  document.getElementById("loveText").innerHTML += `
    <br><br>
    <h3>Our Beautiful Moments 📸</h3>
    <div class="slider">
      <img id="slide" src="./photo1.jpg">
    </div>
    <br>
    <h3>Will you always be mine? 💖</h3>
    <button onclick="yesLove()">YES 😭💞</button>
    <button id="noBtn" onmouseover="moveNo()">NO 😏</button>
  `;
  startSlider();
}

function startSlider(){
  setInterval(()=>{
    index = (index + 1) % images.length;
    document.getElementById("slide").src = images[index];
  },2000);
}

/* BUTTONS */
function moveNo(){
  let btn = document.getElementById("noBtn");
  btn.style.position="absolute";
  btn.style.left=Math.random()*80+"vw";
  btn.style.top=Math.random()*80+"vh";
}

function yesLove(){
  document.getElementById("loveText").innerHTML = `
    <h2>Happy Birthday My Love 🎂💖</h2>
    <p>You are my forever, my always, my everything 🥺</p>
    <p>I love you endlessly, my munchkin 💞</p>
    <h3>5 years… and forever to go 💖</h3>
  `;
  heartBlast();
}

/* HEART EFFECTS */
function heartBlast(){
  for(let i=0;i<50;i++){
    let h=document.createElement("div");
    h.innerHTML="💖";
    h.style.position="fixed";
    h.style.left=Math.random()*100+"vw";
    h.style.top=Math.random()*100+"vh";
    h.style.animation="pop 2s ease";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),2000);
  }
}

function createHeart(e){
  let h=document.createElement("div");
  h.innerHTML="💖";
  h.style.position="absolute";
  h.style.left=e.clientX+"px";
  h.style.top=e.clientY+"px";
  h.style.animation="pop 1s ease forwards";
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),1000);
}
</script>

</body>
</html>s
